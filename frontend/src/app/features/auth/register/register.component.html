<div class="auth-page">
  <div class="auth-card card">
    <p class="eyebrow">Get-It-Together</p>
    <h1>Create your account</h1>
    <p class="subtitle">Start tracking the habits behind who you want to become.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label class="field">
        <span>Display name</span>
        <input type="text" formControlName="displayName" autocomplete="name" />
      </label>

      <label class="field">
        <span>Email</span>
        <input type="email" formControlName="email" autocomplete="email" />
      </label>

      <label class="field">
        <span>Password</span>
        <input type="password" formControlName="password" autocomplete="new-password" />
        <small>At least 8 characters.</small>
      </label>

      @if (errorMessage()) {
        <p class="error-text">{{ errorMessage() }}</p>
      }

      <button type="submit" class="btn" [disabled]="form.invalid || submitting()">
        {{ submitting() ? 'Creating account…' : 'Create account' }}
      </button>
    </form>

    <p class="switch">Already have an account? <a routerLink="/login">Log in</a></p>
  </div>
</div>
