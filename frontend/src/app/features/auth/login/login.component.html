<div class="auth-page">
  <div class="auth-card card">
    <p class="eyebrow">Get It Together</p>
    <h1>Welcome back</h1>
    <p class="subtitle">Log in to check in on today's habits.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label class="field">
        <span>Email</span>
        <input type="email" formControlName="email" autocomplete="email" />
      </label>

      <label class="field">
        <span>Password</span>
        <input type="password" formControlName="password" autocomplete="current-password" />
      </label>

      @if (errorMessage()) {
        <p class="error-text">{{ errorMessage() }}</p>
      }

      <button type="submit" class="btn" [disabled]="form.invalid || submitting()">
        {{ submitting() ? 'Logging in…' : 'Log in' }}
      </button>
    </form>

    <p class="switch">Don't have an account? <a routerLink="/register">Register</a></p>
  </div>
</div>
