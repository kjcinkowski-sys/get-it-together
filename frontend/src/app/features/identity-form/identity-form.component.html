<div class="form-page">
  <div class="form-card card">
    <p class="eyebrow">New identity</p>
    <h1>Who are you becoming?</h1>
    <p class="subtitle">Identities are the "I am a ___" statements your habits reinforce.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label class="field">
        <span>Statement</span>
        <input type="text" formControlName="statement" placeholder="I am a runner" />
      </label>

      <div class="field">
        <span>Companion</span>
        <small>Pick a character to grow as you stay consistent.</small>
        <div class="companion-picker">
          @for (option of companionOptions; track option.type) {
            <button
              type="button"
              class="companion-option"
              [class.selected]="form.controls.companion.value === option.type"
              (click)="selectCompanion(option.type)"
            >
              <app-companion [type]="option.type" [stage]="previewStage" [size]="72" />
              <span class="companion-label">{{ option.label }}</span>
            </button>
          }
        </div>
      </div>

      @if (errorMessage()) {
        <p class="error-text">{{ errorMessage() }}</p>
      }

      <div class="actions">
        <a routerLink="/" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn" [disabled]="form.invalid || submitting()">
          {{ submitting() ? 'Saving…' : 'Create identity' }}
        </button>
      </div>
    </form>
  </div>
</div>
